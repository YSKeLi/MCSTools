appId: com.mcservertools.app
productName: MinecraftServerTools
directories:
  output: release
files:
  - dist/main/**/*
  - dist/renderer/**/*
  - package.json
  - "!dist/**/*.map"
icon: public/icons/app-icon.png
win:
  artifactName: MCServerTools-Windows-${arch}.${ext}
  target:
    - nsis
    - msi
    - zip
mac:
  artifactName: MCServerTools-macOS-${arch}.${ext}
  target:
    - dmg
    - zip
linux:
  artifactName: MCServerTools-Linux-${arch}.${ext}
  target:
    - AppImage
    - deb
    - rpm
  category: Utility
  maintainer: "YSKeLi <110509979+YSKeLi@users.noreply.github.com>"
msi:
  oneClick: false
  upgradeCode: "{4E2895A3-0FE8-4A63-B648-C6613D7C4D79}"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
