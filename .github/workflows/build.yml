name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            suffix: Windows-x64
            target: win
            installer_args: --win nsis --win msi --x64
          - os: windows-latest
            arch: arm64
            suffix: Windows-arm64
            target: win
            installer_args: --win nsis --win msi --arm64
          - os: macos-latest
            arch: x64
            suffix: macOS-x64
            target: mac
            installer_args: --mac dmg --x64
          - os: macos-latest
            arch: arm64
            suffix: macOS-arm64
            target: mac
            installer_args: --mac dmg --arm64
          - os: ubuntu-latest
            arch: x64
            suffix: Linux-x64
            target: linux
            installer_args: --linux AppImage --linux deb --linux rpm --x64
          - os: ubuntu-latest
            arch: arm64
            suffix: Linux-arm64
            target: linux
            installer_args: --linux AppImage --arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -o Acquire::AllowInsecureRepositories=true 2>/dev/null || true
          sudo apt-get install -y libx11-xcb1 libxtst6 libxrandr2 libasound2t64 libnss3 libgtk-3-0 xvfb rpm

      - run: npm ci
      - run: npm run build

      - name: Build installer
        run: npx electron-builder ${{ matrix.installer_args }} --publish=never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build portable zip
        run: npx electron-builder --${{ matrix.target }} --${{ matrix.arch }} --dir --publish=never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release/dist | Out-Null

          Get-ChildItem release -File | Where-Object {
            $_.Extension -in '.exe', '.msi', '.dmg', '.AppImage', '.deb', '.rpm'
          } | ForEach-Object {
            $newname = "MCServerTools-${{ matrix.suffix }}$($_.Extension)"
            Copy-Item $_.FullName "release/dist/$newname"
          }

          $appdir = Get-ChildItem release -Directory | Where-Object {
            -not $_.Name.StartsWith('.') -and $_.Name -ne 'dist'
          } | Select-Object -First 1

          if ($appdir) {
            Compress-Archive -Path "$($appdir.FullName)/*" -DestinationPath "release/dist/MCServerTools-${{ matrix.suffix }}.zip" -Force
          }

      - uses: actions/upload-artifact@v4
        with:
          name: MCServerTools-${{ matrix.suffix }}
          path: release/dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release metadata
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          import os

          version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          notes = [
              "新增云服务器管理",
              "新增本地设备信息监控",
              "新增 Java 管理与 Java 21 下载",
              "支持自动匹配系统和安装包",
              "支持为服务器单独配置 Java",
              "重构 FRP 配置导入与切换",
              "优化 FRP 下载和启动流程",
              "完善软件检查更新与自动安装",
              "优化文件下载稳定性",
              "修复服务器启动和进程控制问题",
          ]
          body = f"## v{version} 更新内容\n\n" + "\n".join(f"- {note}" for note in notes)
          Path("release-body.md").write_text(body + "\n", encoding="utf-8")
          Path("release-notes.json").write_text(json.dumps(notes, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body_path: release-body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest.json on main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" > release.json

          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          version = tag[1:] if tag.startswith("v") else tag
          release = json.loads(Path("release.json").read_text(encoding="utf-8"))
          notes = json.loads(Path("release-notes.json").read_text(encoding="utf-8"))
          artifact_files = {
              path.name: path
              for path in Path("artifacts").rglob("*")
              if path.is_file()
          }
          assets = []
          for asset in release.get("assets", []):
              asset_path = artifact_files.get(asset["name"])
              if asset_path is None:
                  raise RuntimeError(f"Missing downloaded artifact: {asset['name']}")
              digest = hashlib.sha256(asset_path.read_bytes()).hexdigest()
              assets.append({
                  "name": asset["name"],
                  "url": asset["browser_download_url"],
                  "size": asset.get("size"),
                  "sha256": digest,
              })

          latest = {
              "repo": os.environ["GITHUB_REPOSITORY"],
              "source": "github-release",
              "version": version,
              "tag": tag,
              "title": tag,
              "publishedAt": release.get("published_at"),
              "url": release.get("html_url"),
              "assets": assets,
              "assetsCount": len(assets),
              "notes": notes,
          }
          Path("latest.json").write_text(json.dumps(latest, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          git checkout main
          cp ../latest.json public/latest.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/latest.json
          git commit -m "chore: update latest.json for ${GITHUB_REF_NAME}" || exit 0
          git push origin main
