name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            suffix: Windows-x64
            target: win
          - os: windows-latest
            arch: arm64
            suffix: Windows-arm64
            target: win
          - os: macos-latest
            arch: x64
            suffix: macOS-x64
            target: mac
          - os: macos-latest
            arch: arm64
            suffix: macOS-arm64
            target: mac
          - os: ubuntu-latest
            arch: x64
            suffix: Linux-x64
            target: linux
          - os: ubuntu-latest
            arch: arm64
            suffix: Linux-arm64
            target: linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -o Acquire::AllowInsecureRepositories=true 2>/dev/null || true
          sudo apt-get install -y libx11-xcb1 libxtst6 libxrandr2 libasound2t64 libnss3 libgtk-3-0 xvfb

      - run: npm ci
      - run: npm run build

      - name: Build installer
        run: npx electron-builder --${{ matrix.target }} --${{ matrix.arch }} --publish=never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build portable zip
        run: npx electron-builder --${{ matrix.target }} --${{ matrix.arch }} --dir --publish=never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release/dist | Out-Null

          Get-ChildItem release -File | Where-Object {
            $_.Extension -in '.exe', '.msi', '.dmg', '.AppImage', '.deb', '.rpm'
          } | ForEach-Object {
            $newname = "MCServerTools-${{ matrix.suffix }}$($_.Extension)"
            Copy-Item $_.FullName "release/dist/$newname"
          }

          $appdir = Get-ChildItem release -Directory | Where-Object {
            -not $_.Name.StartsWith('.') -and $_.Name -ne 'dist'
          } | Select-Object -First 1

          if ($appdir) {
            Compress-Archive -Path "$($appdir.FullName)/*" -DestinationPath "release/dist/MCServerTools-${{ matrix.suffix }}.zip" -Force
          }

      - uses: actions/upload-artifact@v4
        with:
          name: MCServerTools-${{ matrix.suffix }}
          path: release/dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release metadata
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          notes = [
              "\u65b0\u589e\u8bbe\u7f6e\u9875\u9762\u4e0e\u68c0\u67e5\u66f4\u65b0\u529f\u80fd",
              "\u91cd\u6784\u670d\u52a1\u7aef\u6838\u5fc3\u4e0b\u8f7d\u9875\u4ee5\u53ca\u903b\u8f91",
              "\u91cd\u6784\u670d\u52a1\u7aef\u6838\u5fc3\u5217\u8868\u6765\u6e90",
              "\u8865\u5145\u66f4\u591a\u6838\u5fc3\u7c7b\u578b\u7684\u81ea\u52a8\u8bc6\u522b\u652f\u6301",
          ]
          body = "## v1.0.3 \u66f4\u65b0\u5185\u5bb9\n\n" + "\n".join(f"- {note}" for note in notes)
          Path("release-body.md").write_text(body + "\n", encoding="utf-8")
          Path("release-notes.json").write_text(json.dumps(notes, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body_path: release-body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest.json on main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" > release.json

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          version = tag[1:] if tag.startswith("v") else tag
          release = json.loads(Path("release.json").read_text(encoding="utf-8"))
          notes = json.loads(Path("release-notes.json").read_text(encoding="utf-8"))
          latest = {
              "repo": os.environ["GITHUB_REPOSITORY"],
              "source": "github-release",
              "version": version,
              "tag": tag,
              "title": tag,
              "publishedAt": release.get("published_at"),
              "url": release.get("html_url"),
              "assets": [
                  {
                      "name": asset["name"],
                      "url": asset["browser_download_url"],
                      "size": asset.get("size"),
                  }
                  for asset in release.get("assets", [])
              ],
              "assetsCount": len(release.get("assets", [])),
              "notes": notes,
          }
          Path("latest.json").write_text(json.dumps(latest, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          git checkout main
          cp ../latest.json public/latest.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/latest.json
          git commit -m "chore: update latest.json for ${GITHUB_REF_NAME}" || exit 0
          git push origin main
